<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>完整流程测试</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🧪 AI 占卜完整流程测试</h1>
    
    <div class="test-section">
        <h2>测试步骤</h2>
        <button onclick="test1BackendHealth()">1. 测试后端健康状态</button>
        <button onclick="test2NormalAPI()">2. 测试普通AI API</button>
        <button onclick="test3StreamAPI()">3. 测试流式AI API</button>
        <button onclick="test4TarotReading()">4. 测试完整占卜流程</button>
        <button onclick="clearResult()">清空结果</button>
    </div>
    
    <div id="result" class="test-section">
        <h2>测试结果</h2>
        <pre id="output">等待测试...</pre>
    </div>
    
    <script>
        const backendUrl = 'http://localhost:3000';
        let output = document.getElementById('output');
        
        function log(msg) {
            output.textContent += msg + '\n';
        }
        
        function clearResult() {
            output.textContent = '';
        }
        
        async function test1BackendHealth() {
            clearResult();
            log('🔍 测试 1: 后端健康状态\n');
            
            try {
                const response = await fetch(`${backendUrl}/api/health`);
                const data = await response.json();
                
                log('✅ 后端运行正常');
                log(`状态: ${data.status}`);
                log(`版本: ${data.version}`);
                log(`架构: ${data.architecture}`);
                log(`\n缓存统计:`);
                log(JSON.stringify(data.cache, null, 2));
            } catch (error) {
                log('❌ 后端连接失败');
                log(`错误: ${error.message}`);
                log('\n请确保后端服务器正在运行:');
                log('cd backend/server');
                log('npm start');
            }
        }
        
        async function test2NormalAPI() {
            clearResult();
            log('🔍 测试 2: 普通AI API\n');
            
            const messages = [
                { role: 'system', content: '你是专业的塔罗占卜师。' },
                { role: 'user', content: '请简单说一下"圣杯侍从"这张牌的含义。' }
            ];
            
            try {
                log('📤 发送请求...');
                const startTime = Date.now();
                
                const response = await fetch(`${backendUrl}/api/ai/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages, stream: false })
                });
                
                const elapsed = Date.now() - startTime;
                log(`⏱️  耗时: ${elapsed}ms`);
                log(`📥 状态: ${response.status}\n`);
                
                if (!response.ok) {
                    log('❌ API调用失败');
                    log(`状态: ${response.status} ${response.statusText}`);
                    return;
                }
                
                const data = await response.json();
                log('📦 响应:');
                log(JSON.stringify(data, null, 2));
                
                if (data.success && data.data && data.data.content) {
                    log('\n✅ 测试成功!');
                    log(`\n💬 AI回复:\n${data.data.content}`);
                } else {
                    log('\n❌ 响应格式错误');
                }
                
            } catch (error) {
                log('❌ 测试失败');
                log(`错误: ${error.message}`);
                log(`堆栈: ${error.stack}`);
            }
        }
        
        async function test3StreamAPI() {
            clearResult();
            log('🔍 测试 3: 流式AI API\n');
            
            const messages = [
                { role: 'system', content: '你是专业的塔罗占卜师。' },
                { role: 'user', content: '请用一句话说"流式测试成功"' }
            ];
            
            try {
                log('📤 发送流式请求...');
                const startTime = Date.now();
                
                const response = await fetch(`${backendUrl}/api/ai/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages, stream: true })
                });
                
                log(`📥 状态: ${response.status}\n`);
                
                if (!response.ok) {
                    log('❌ 流式API调用失败');
                    log(`状态: ${response.status} ${response.statusText}`);
                    return;
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';
                let chunkCount = 0;
                
                log('📊 接收流式数据:\n');
                log('─'.repeat(50));
                
                while (true) {
                    const { done, value } = await reader.read();
                    
                    if (done) {
                        log('\n' + '─'.repeat(50));
                        const elapsed = Date.now() - startTime;
                        log(`\n✅ 流式传输完成 (总耗时: ${elapsed}ms)`);
                        break;
                    }
                    
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6).trim();
                            
                            if (data === '[DONE]') continue;
                            
                            try {
                                const json = JSON.parse(data);
                                const content = json.content || json.choices?.[0]?.delta?.content || '';
                                
                                if (content) {
                                    fullContent += content;
                                    chunkCount++;
                                    if (chunkCount <= 10 || chunkCount % 10 === 0) {
                                        log(content);
                                    }
                                }
                            } catch (e) {
                                // 忽略
                            }
                        }
                    }
                }
                
                log(`\n💬 完整内容 (${fullContent.length}字符):`);
                log(fullContent);
                
                if (!fullContent) {
                    log('\n⚠️  警告: 未收到任何内容!');
                }
                
            } catch (error) {
                log('❌ 流式测试失败');
                log(`错误: ${error.message}`);
                log(`堆栈: ${error.stack}`);
            }
        }
        
        async function test4TarotReading() {
            clearResult();
            log('🔍 测试 4: 完整占卜流程\n');
            
            // 模拟占卜数据
            const mockSpread = {
                id: 'three-card',
                name: '三牌阵',
                cardCount: 3,
                positions: [
                    { name: '过去', description: '过去的影响' },
                    { name: '现在', description: '现在的状态' },
                    { name: '未来', description: '未来的趋势' }
                ]
            };
            
            const mockCards = [
                { card: { id: 'page-of-cups', name: '圣杯侍从' }, reversed: false },
                { card: { id: 'six-of-cups', name: '圣杯六' }, reversed: false },
                { card: { id: 'eight-of-swords', name: '宝剑八' }, reversed: true }
            ];
            
            const mockQuestion = '我的感情运势如何？';
            
            log('📝 模拟占卜数据:');
            log(`问题: ${mockQuestion}`);
            log(`牌阵: ${mockSpread.name}`);
            log(`牌数: ${mockSpread.cardCount}`);
            mockCards.forEach((item, i) => {
                log(`  ${i + 1}. ${mockSpread.positions[i].name}: ${item.card.name} ${item.reversed ? '(逆位)' : '(正位)'}`);
            });
            log('');
            
            try {
                // 构建prompt
                const systemPrompt = {
                    role: 'system',
                    content: '你是专业的塔罗占卜师，语调温暖、积极、有启发性。'
                };
                
                // 简化的prompt
                const userPrompt = {
                    role: 'user',
                    content: `用户问题：${mockQuestion}

使用的牌阵：${mockSpread.name}（${mockSpread.cardCount}张牌）

抽到的牌：
1. 【过去】圣杯侍从（正位）
2. 【现在】圣杯六（正位）
3. 【未来】宝剑八（逆位）

请简要解读这个牌阵（50-100字）。`
                };
                
                log('📤 发送占卜请求...');
                const startTime = Date.now();
                
                const response = await fetch(`${backendUrl}/api/ai/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [systemPrompt, userPrompt],
                        stream: false
                    })
                });
                
                const elapsed = Date.now() - startTime;
                log(`⏱️  耗时: ${elapsed}ms`);
                log(`📥 状态: ${response.status}\n`);
                
                if (!response.ok) {
                    log('❌ 占卜请求失败');
                    log(`状态: ${response.status} ${response.statusText}`);
                    return;
                }
                
                const data = await response.json();
                
                if (data.success && data.data && data.data.content) {
                    log('✅ 占卜成功!\n');
                    log('💬 AI解读:');
                    log(data.data.content);
                } else {
                    log('❌ 响应格式错误');
                    log(JSON.stringify(data, null, 2));
                }
                
            } catch (error) {
                log('❌ 占卜测试失败');
                log(`错误: ${error.message}`);
                log(`堆栈: ${error.stack}`);
            }
        }
    </script>
</body>
</html>
