<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 命运迷失了方向 | 神秘塔罗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 背景星星效果 */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #d4af37;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            text-align: center;
            padding: 40px;
            position: relative;
            z-index: 10;
        }

        /* 倒立的愚者牌 */
        .fool-card {
            width: 200px;
            height: 300px;
            margin: 0 auto 40px;
            position: relative;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(180deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .card-inner {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #2a2a3e 0%, #1a1a2e 100%);
            border: 3px solid #d4af37;
            border-radius: 15px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(212, 175, 55, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .card-inner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(180deg, rgba(212, 175, 55, 0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .card-number {
            font-size: 6rem;
            color: #d4af37;
            font-weight: bold;
            text-shadow: 
                0 0 20px rgba(212, 175, 55, 0.5),
                0 0 40px rgba(212, 175, 55, 0.3);
            letter-spacing: 0.1em;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(212, 175, 55, 0.5), 0 0 40px rgba(212, 175, 55, 0.3); }
            50% { text-shadow: 0 0 30px rgba(212, 175, 55, 0.8), 0 0 60px rgba(212, 175, 55, 0.5); }
        }

        .card-icon {
            font-size: 4rem;
            margin-top: 10px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
        }

        .card-name {
            font-size: 1.2rem;
            color: #9d9a94;
            margin-top: 15px;
            letter-spacing: 0.2em;
            font-weight: 300;
        }

        .error-code {
            font-size: 1.5rem;
            color: #d4af37;
            margin-bottom: 20px;
            letter-spacing: 0.3em;
            font-weight: 300;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .error-title {
            font-size: 2.5rem;
            color: #e8e6e3;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 0.1em;
        }

        .error-message {
            font-size: 1.1rem;
            color: #9d9a94;
            margin-bottom: 40px;
            line-height: 1.8;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-home {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #d4af37 0%, #b8960c 100%);
            color: #0a0a0f;
            text-decoration: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 10px 30px rgba(212, 175, 55, 0.4),
                0 0 30px rgba(212, 175, 55, 0.3);
        }

        .btn-home:active {
            transform: translateY(-1px);
        }

        /* 装饰性符号 */
        .symbols {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .symbol {
            position: absolute;
            font-size: 2rem;
            opacity: 0.1;
            color: #d4af37;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .symbol:nth-child(1) { top: 10%; left: 10%; animation-duration: 15s; }
        .symbol:nth-child(2) { top: 20%; right: 15%; animation-duration: 18s; }
        .symbol:nth-child(3) { bottom: 15%; left: 15%; animation-duration: 22s; }
        .symbol:nth-child(4) { bottom: 20%; right: 10%; animation-duration: 16s; }
        .symbol:nth-child(5) { top: 50%; left: 5%; animation-duration: 25s; }
        .symbol:nth-child(6) { top: 50%; right: 5%; animation-duration: 20s; }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .fool-card {
                width: 150px;
                height: 225px;
            }

            .card-number {
                font-size: 4rem;
            }

            .card-icon {
                font-size: 3rem;
            }

            .error-title {
                font-size: 2rem;
            }

            .error-message {
                font-size: 1rem;
                padding: 0 20px;
            }

            .btn-home {
                padding: 12px 30px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .fool-card {
                width: 120px;
                height: 180px;
            }

            .card-number {
                font-size: 3rem;
            }

            .card-icon {
                font-size: 2rem;
            }

            .error-title {
                font-size: 1.5rem;
            }

            .error-message {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- 背景星星 -->
    <div class="stars" id="stars"></div>

    <!-- 装饰性符号 -->
    <div class="symbols">
        <div class="symbol">☽</div>
        <div class="symbol">✧</div>
        <div class="symbol">☆</div>
        <div class="symbol">✦</div>
        <div class="symbol">⚝</div>
        <div class="symbol">✡</div>
    </div>

    <div class="container">
        <!-- 倒立的愚者牌 -->
        <div class="fool-card">
            <div class="card-inner">
                <div class="card-number">404</div>
                <div class="card-icon">🔮</div>
                <div class="card-name">THE FOOL · 愚者</div>
            </div>
        </div>

        <div class="error-code">PAGE NOT FOUND</div>
        
        <h1 class="error-title">命运似乎迷失了方向</h1>
        
        <p class="error-message">
            愚者站在悬崖边缘，望向未知的虚空。<br>
            你寻找的页面已经消失在迷雾之中，<br>
            或许这正是命运给你的一个新的指引。
        </p>

        <a href="/" class="btn-home">
            ✧ 返回首页，重新开始 ✧
        </a>
    </div>

    <script>
        // 生成背景星星
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const numberOfStars = 100;

            for (let i = 0; i < numberOfStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                starsContainer.appendChild(star);
            }
        }

        createStars();

        // 添加键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
