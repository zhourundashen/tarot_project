<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分享功能测试</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
        }
        h1 { color: #D946EF; text-align: center; }
        .test-section {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            margin: 20px 0;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h2 { color: #A78BFA; margin-top: 0; }
        button {
            background: linear-gradient(135deg, #6B21A8 0%, #9333EA 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
            transition: all 0.3s;
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(107, 33, 168, 0.4);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result {
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
        }
        .success { background: rgba(74, 222, 128, 0.1); border-left: 4px solid #4ade80; }
        .error { background: rgba(248, 113, 113, 0.1); border-left: 4px solid #f87171; }
        .warning { background: rgba(251, 191, 36, 0.1); border-left: 4px solid #fbbf24; }
        .info { background: rgba(96, 165, 250, 0.1); border-left: 4px solid #60a5fa; }
        
        #test-images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .test-image-container {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
        }
        .test-image-container h3 {
            color: #A78BFA;
            margin: 0 0 10px 0;
            font-size: 16px;
        }
        .test-image-container img {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>🔮 分享功能完整测试</h1>
    
    <div class="test-section">
        <h2>1. 模块加载测试</h2>
        <button id="btn-load-module" onclick="testModuleLoad()">加载 share 模块</button>
        <div id="module-result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. 单张图片生成测试</h2>
        <button id="btn-test-single" onclick="testSingleImage()">生成单张分享图</button>
        <div id="single-result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. 多模板测试</h2>
        <button onclick="testAllTemplates()">测试所有模板</button>
        <div id="templates-result"></div>
    </div>
    
    <div class="test-section">
        <h2>4. 数据洞察图片测试</h2>
        <button onclick="testInsightImage()">生成数据洞察图</button>
        <div id="insight-result"></div>
    </div>
    
    <div class="test-section">
        <h2>5. 完整流程测试</h2>
        <button onclick="testFullFlow()">测试完整分享流程</button>
        <div id="full-result"></div>
    </div>
    
    <div class="test-section">
        <h2>生成的图片预览</h2>
        <div id="test-images"></div>
    </div>

    <script src="js/module-loader.js"></script>
    <script>
        // 测试数据
        const testCards = [
            { 
                card: { 
                    name: '愚者', 
                    keywords: ['新开始', '冒险', '纯真', '自由'],
                    element: '风'
                }, 
                reversed: false, 
                position: '过去' 
            },
            { 
                card: { 
                    name: '魔术师', 
                    keywords: ['创造力', '技能', '自信', '专注'],
                    element: '风'
                }, 
                reversed: false, 
                position: '现在' 
            },
            { 
                card: { 
                    name: '女祭司', 
                    keywords: ['直觉', '神秘', '潜意识', '智慧'],
                    element: '水'
                }, 
                reversed: true, 
                position: '未来' 
            }
        ];

        const testOptions = {
            question: '我最近的感情运势如何？',
            spreadName: '三牌阵',
            cards: testCards,
            interpretation: '根据牌面显示，你的感情运势正在上升。过去的影响显示了新的开始，现在的状态表明你拥有创造美好关系的能力，未来的趋势提示要相信自己的直觉。',
            keywords: ['新开始', '创造力', '直觉'],
            summary: '这是一个积极的时期，适合开启新的感情篇章。',
            scores: { love: 85, career: 70, wealth: 65, health: 80, study: 60 },
            trend: [60, 75, 85],
            elements: { fire: 20, water: 35, air: 30, earth: 15 }
        };

        function showResult(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="result ${type}">${message}</div>`;
        }

        async function testModuleLoad() {
            const btn = document.getElementById('btn-load-module');
            const resultDiv = document.getElementById('module-result');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 加载中...';
            
            try {
                if (typeof ModuleLoader === 'undefined') {
                    throw new Error('ModuleLoader 未定义');
                }
                
                showResult('module-result', '✓ ModuleLoader 存在', 'success');
                
                await ModuleLoader.load('share');
                
                if (typeof TarotShare === 'undefined') {
                    throw new Error('TarotShare 加载失败');
                }
                
                showResult('module-result', `
                    ✓ share 模块加载成功<br>
                    ✓ TarotShare 对象存在<br>
                    ✓ 可用模板: ${Object.keys(TarotShare.templates).join(', ')}<br>
                    ✓ 可用方法: generateShareImage, showShareModal, handleDownload, handleShare
                `, 'success');
                
                btn.innerHTML = '✓ 加载完成';
                
            } catch (error) {
                showResult('module-result', `✗ 错误: ${error.message}`, 'error');
                btn.innerHTML = '重试';
                btn.disabled = false;
                console.error('模块加载失败:', error);
            }
        }

        async function testSingleImage() {
            const btn = document.getElementById('btn-test-single');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 生成中...';
            
            try {
                if (typeof TarotShare === 'undefined') {
                    await ModuleLoader.load('share');
                }
                
                showResult('single-result', '正在生成分享图片...', 'warning');
                
                const imageData = await TarotShare.generateShareImage({
                    ...testOptions,
                    template: 'mystic'
                });
                
                if (!imageData || !imageData.startsWith('data:image')) {
                    throw new Error('生成的图片数据格式不正确');
                }
                
                showResult('single-result', `
                    ✓ 图片生成成功<br>
                    ✓ 数据格式: ${imageData.substring(0, 50)}...<br>
                    ✓ 数据大小: ${(imageData.length / 1024).toFixed(2)} KB
                `, 'success');
                
                // 显示图片
                addTestImage('神秘星空模板', imageData);
                
                btn.innerHTML = '✓ 生成成功';
                
            } catch (error) {
                showResult('single-result', `✗ 错误: ${error.message}<br><br>详细错误:<br>${error.stack}`, 'error');
                btn.innerHTML = '重试';
                btn.disabled = false;
                console.error('生成失败:', error);
            }
        }

        async function testAllTemplates() {
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 测试中...';
            
            try {
                if (typeof TarotShare === 'undefined') {
                    await ModuleLoader.load('share');
                }
                
                const templates = ['mystic', 'forest', 'dream', 'ice'];
                const results = [];
                
                for (const template of templates) {
                    try {
                        showResult('templates-result', `正在测试 ${template} 模板...`, 'warning');
                        
                        const imageData = await TarotShare.generateShareImage({
                            ...testOptions,
                            template: template
                        });
                        
                        if (imageData && imageData.startsWith('data:image')) {
                            results.push({ template, success: true });
                            addTestImage(TarotShare.templates[template].name, imageData);
                        } else {
                            results.push({ template, success: false, error: '数据格式错误' });
                        }
                    } catch (e) {
                        results.push({ template, success: false, error: e.message });
                    }
                }
                
                const successCount = results.filter(r => r.success).length;
                const html = results.map(r => 
                    `${r.success ? '✓' : '✗'} ${r.template}: ${r.success ? '成功' : r.error}`
                ).join('<br>');
                
                showResult('templates-result', `
                    测试完成: ${successCount}/${templates.length} 个模板成功<br><br>
                    ${html}
                `, successCount === templates.length ? 'success' : 'warning');
                
                btn.innerHTML = '✓ 测试完成';
                
            } catch (error) {
                showResult('templates-result', `✗ 错误: ${error.message}`, 'error');
                btn.innerHTML = '重试';
                btn.disabled = false;
                console.error('测试失败:', error);
            }
        }

        async function testInsightImage() {
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 生成中...';
            
            try {
                if (typeof TarotShare === 'undefined') {
                    await ModuleLoader.load('share');
                }
                
                showResult('insight-result', '正在生成数据洞察图片...', 'warning');
                
                const insightData = {
                    ...testOptions,
                    uprightCount: 2,
                    reversedCount: 1
                };
                
                const imageData = await TarotShare.generateInsightImage(insightData);
                
                if (!imageData || !imageData.startsWith('data:image')) {
                    throw new Error('生成的图片数据格式不正确');
                }
                
                showResult('insight-result', `
                    ✓ 数据洞察图片生成成功<br>
                    ✓ 数据大小: ${(imageData.length / 1024).toFixed(2)} KB
                `, 'success');
                
                addTestImage('数据洞察', imageData);
                
                btn.innerHTML = '✓ 生成成功';
                
            } catch (error) {
                showResult('insight-result', `✗ 错误: ${error.message}<br><br>详细错误:<br>${error.stack}`, 'error');
                btn.innerHTML = '重试';
                btn.disabled = false;
                console.error('生成失败:', error);
            }
        }

        async function testFullFlow() {
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 测试中...';
            
            try {
                if (typeof TarotShare === 'undefined') {
                    await ModuleLoader.load('share');
                }
                
                showResult('full-result', '步骤1: 检查 TarotShare...', 'warning');
                
                if (typeof TarotShare === 'undefined') {
                    throw new Error('TarotShare 未定义');
                }
                showResult('full-result', '✓ 步骤1: TarotShare 存在<br>步骤2: 设置分享选项...', 'warning');
                
                TarotShare.setShareOptions(testOptions);
                showResult('full-result', '✓ 步骤1: TarotShare 存在<br>✓ 步骤2: 选项设置完成<br>步骤3: 生成所有页面...', 'warning');
                
                const pages = await TarotShare.generateAllPages(testOptions);
                showResult('full-result', `
                    ✓ 步骤1: TarotShare 存在<br>
                    ✓ 步骤2: 选项设置完成<br>
                    ✓ 步骤3: 生成了 ${pages.length} 个页面<br>
                    步骤4: 显示分享模态框...
                `, 'warning');
                
                // 显示分享模态框
                TarotShare.showShareModalWithPages(pages, testOptions);
                
                showResult('full-result', `
                    ✓ 步骤1: TarotShare 存在<br>
                    ✓ 步骤2: 选项设置完成<br>
                    ✓ 步骤3: 生成了 ${pages.length} 个页面<br>
                    ✓ 步骤4: 模态框已显示<br><br>
                    ✅ 完整流程测试通过！<br>
                    请查看页面上的分享模态框。
                `, 'success');
                
                btn.innerHTML = '✓ 测试完成';
                
            } catch (error) {
                showResult('full-result', `✗ 错误: ${error.message}<br><br>详细错误:<br>${error.stack}`, 'error');
                btn.innerHTML = '重试';
                btn.disabled = false;
                console.error('测试失败:', error);
            }
        }

        function addTestImage(title, imageData) {
            const container = document.createElement('div');
            container.className = 'test-image-container';
            container.innerHTML = `
                <h3>${title}</h3>
                <img src="${imageData}" alt="${title}">
            `;
            document.getElementById('test-images').appendChild(container);
        }

        // 页面加载后自动测试模块加载
        window.addEventListener('load', () => {
            setTimeout(() => {
                testModuleLoad();
            }, 500);
        });
    </script>
</body>
</html>
